- name: Configure VM networking
  hosts: all_lab
  become: true
  tags:
    - network
    - netplan
  roles:
    - netplan

- name: Prepare all lab nodes
  hosts: all_lab
  become: true
  roles:
    - common

- name: Install RKE2 server
  hosts: masters
  become: true
  roles:
    - rke2_server

- name: Install RKE2 agents
  hosts: workers
  become: true
  roles:
    - rke2_agent

- name: Configure ingress NodePort
  hosts: masters
  become: true
  tags:
    - k8s_ingress_nodeport
    - ingress
  roles:
    - k8s_ingress_nodeport

- name: Install Helm
  hosts: masters
  become: true
  tags:
    - helm
  roles:
    - helm

- name: Install cert-manager
  hosts: masters
  become: true
  tags:
    - cert_manager
  roles:
    - cert_manager

- name: Configure Let's Encrypt issuer
  hosts: masters
  become: true
  tags:
    - cert_issuer
    - letsencrypt
  roles:
    - cert_issuer

- name: Install Rancher
  hosts: masters
  become: true
  tags:
    - rancher
  roles:
    - rancher

- name: Configure load balancer
  hosts: load_balancers
  become: true
  roles:
    - load_balancer

- name: Verify cluster from master
  hosts: masters
  become: true
  tasks:
    - name: Show nodes
      ansible.builtin.command: /var/lib/rancher/rke2/bin/kubectl get nodes -o wide
      environment:
        KUBECONFIG: /etc/rancher/rke2/rke2.yaml
      register: nodes_result
      changed_when: false

    - name: Print nodes
      ansible.builtin.debug:
        var: nodes_result.stdout_lines
