- name: Install load balancer packages
  ansible.builtin.apt:
    name:
      - haproxy
      - curl
      - ca-certificates
      - gpg
    state: present
    update_cache: true

- name: Render HAProxy configuration
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    owner: root
    group: root
    mode: "0644"
    validate: haproxy -c -f %s
  notify: Restart haproxy

- name: Enable and start HAProxy
  ansible.builtin.systemd:
    name: haproxy
    enabled: true
    state: started
    daemon_reload: true

- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /usr/share/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Add Cloudflare package signing key
  ansible.builtin.get_url:
    url: https://pkg.cloudflare.com/cloudflare-main.gpg
    dest: /usr/share/keyrings/cloudflare-main.gpg
    owner: root
    group: root
    mode: "0644"
    timeout: 60

- name: Add Cloudflare cloudflared apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/cloudflare-main.gpg] https://pkg.cloudflare.com/cloudflared any main"
    filename: cloudflared
    state: present
    update_cache: true

- name: Install cloudflared package
  ansible.builtin.apt:
    name: cloudflared
    state: present

- name: Verify cloudflared binary
  ansible.builtin.command: cloudflared --version
  register: cloudflared_version
  changed_when: false

- name: Print cloudflared version
  ansible.builtin.debug:
    var: cloudflared_version.stdout

- name: Require Cloudflare tunnel token before installing service
  ansible.builtin.assert:
    that:
      - cloudflare_tunnel_token | length > 0
    fail_msg: "cloudflare_tunnel_token is empty. Set vault_cloudflare_tunnel_token in group_vars/all/vault.yml and run with --ask-vault-pass."
    success_msg: "cloudflare_tunnel_token is loaded; installing cloudflared service is enabled."

- name: Check cloudflared service unit
  ansible.builtin.stat:
    path: /etc/systemd/system/cloudflared.service
  register: cloudflared_service_unit

- name: Install cloudflared tunnel service
  ansible.builtin.command: cloudflared service install {{ cloudflare_tunnel_token }}
  register: cloudflared_service_install
  changed_when: cloudflared_service_install.rc == 0
  no_log: true
  async: 90
  poll: 5
  when:
    - cloudflare_tunnel_token | length > 0
    - not cloudflared_service_unit.stat.exists

- name: Enable and start cloudflared
  ansible.builtin.systemd:
    name: cloudflared
    enabled: true
    state: started
    daemon_reload: true
  when: cloudflare_tunnel_token | length > 0

- name: Verify HAProxy configuration
  ansible.builtin.command: haproxy -c -f /etc/haproxy/haproxy.cfg
  register: haproxy_config_check
  changed_when: false

- name: Print HAProxy configuration check
  ansible.builtin.debug:
    var: haproxy_config_check.stdout_lines

- name: Show HAProxy service status
  ansible.builtin.command: systemctl is-active haproxy
  register: haproxy_status
  changed_when: false

- name: Print HAProxy service status
  ansible.builtin.debug:
    var: haproxy_status.stdout

- name: Verify HAProxy HTTP frontend locally
  ansible.builtin.command: curl --max-time 10 -I http://127.0.0.1
  register: haproxy_http_check
  changed_when: false
  failed_when: false

- name: Print HAProxy HTTP frontend check
  ansible.builtin.debug:
    var: haproxy_http_check.stdout_lines

- name: Verify HAProxy stats endpoint locally
  ansible.builtin.command: curl --max-time 10 -I http://127.0.0.1:8404/stats
  register: haproxy_stats_check
  changed_when: false
  failed_when: false

- name: Print HAProxy stats endpoint check
  ansible.builtin.debug:
    var: haproxy_stats_check.stdout_lines

- name: Show cloudflared service status
  ansible.builtin.command: systemctl is-active cloudflared
  register: cloudflared_status
  changed_when: false
  failed_when: false
  when: cloudflare_tunnel_token | length > 0

- name: Print cloudflared service status
  ansible.builtin.debug:
    var: cloudflared_status.stdout
  when: cloudflare_tunnel_token | length > 0
