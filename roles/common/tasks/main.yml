- name: Set hostname from inventory
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Disable legacy load balancer NAT service
  ansible.builtin.systemd:
    name: rke2-lab-nat
    enabled: false
    state: stopped
    daemon_reload: true
  failed_when: false
  when: inventory_hostname in groups['load_balancers']

- name: Remove legacy load balancer NAT service file
  ansible.builtin.file:
    path: /etc/systemd/system/rke2-lab-nat.service
    state: absent
  when: inventory_hostname in groups['load_balancers']

- name: Disable legacy private-node internet rules
  ansible.builtin.systemd:
    name: rke2-lab-private-node-internet
    enabled: false
    state: stopped
    daemon_reload: true
  failed_when: false
  when: inventory_hostname in groups['load_balancers']

- name: Remove legacy private-node internet rules service file
  ansible.builtin.file:
    path: /etc/systemd/system/rke2-lab-private-node-internet.service
    state: absent
  when: inventory_hostname in groups['load_balancers']

- name: List load balancer network interfaces for cleanup
  ansible.builtin.shell: "ip -o link show | awk -F': ' '{print $2}' | cut -d@ -f1 | grep -v '^lo$'"
  register: lab_lb_cleanup_interfaces
  changed_when: false
  when: inventory_hostname in groups['load_balancers']

- name: Remove legacy private-node outbound forward rule
  ansible.builtin.command: >-
    iptables -D FORWARD
    -s {{ lab_network_cidr }}
    -o {{ item }}
    -j ACCEPT
  loop: "{{ lab_lb_cleanup_interfaces.stdout_lines | default([]) }}"
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['load_balancers']

- name: Remove legacy private-node established return rule
  ansible.builtin.command: >-
    iptables -D FORWARD
    -d {{ lab_network_cidr }}
    -i {{ item }}
    -m conntrack
    --ctstate ESTABLISHED,RELATED
    -j ACCEPT
  loop: "{{ lab_lb_cleanup_interfaces.stdout_lines | default([]) }}"
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['load_balancers']

- name: Remove legacy private-node inbound forward drop rule
  ansible.builtin.command: >-
    iptables -D FORWARD
    -d {{ lab_network_cidr }}
    -i {{ item }}
    -j DROP
  loop: "{{ lab_lb_cleanup_interfaces.stdout_lines | default([]) }}"
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['load_balancers']

- name: Remove legacy private-node NAT rule
  ansible.builtin.command: >-
    iptables -t nat -D POSTROUTING
    -s {{ lab_network_cidr }}
    -o {{ item }}
    -j MASQUERADE
  loop: "{{ lab_lb_cleanup_interfaces.stdout_lines | default([]) }}"
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['load_balancers']

- name: Disable legacy private-node default route service
  ansible.builtin.systemd:
    name: rke2-lab-default-route
    enabled: false
    state: stopped
    daemon_reload: true
  failed_when: false
  when: inventory_hostname in groups['rke2_cluster']

- name: Remove legacy private-node default route service file
  ansible.builtin.file:
    path: /etc/systemd/system/rke2-lab-default-route.service
    state: absent
  when: inventory_hostname in groups['rke2_cluster']

- name: Remove legacy default route through load balancer
  ansible.builtin.command: ip route del default via {{ lb_ip }}
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['rke2_cluster']

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 86400
    lock_timeout: 120

- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - vim
      - net-tools
      - open-iscsi
      - nfs-common
      - apparmor
      - apparmor-utils
      - ca-certificates
      - gnupg
      - lsb-release
    state: present
    lock_timeout: 120

- name: Enable and start open-iscsi
  ansible.builtin.systemd:
    name: iscsid
    enabled: true
    state: started
  failed_when: false

- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Disable swap permanently in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'

- name: Configure Kubernetes kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      br_netfilter
      overlay
    owner: root
    group: root
    mode: "0644"

- name: Load br_netfilter module
  ansible.builtin.command: modprobe br_netfilter
  changed_when: false

- name: Load overlay module
  ansible.builtin.command: modprobe overlay
  changed_when: false

- name: Configure Kubernetes sysctl
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-kubernetes.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl

- name: Apply sysctl immediately
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: Disable UFW for local lab
  ansible.builtin.systemd:
    name: ufw
    enabled: false
    state: stopped
  failed_when: false

- name: Disable legacy SSH allowlist service
  ansible.builtin.systemd:
    name: rke2-lab-ssh-allowlist
    enabled: false
    state: stopped
    daemon_reload: true
  failed_when: false

- name: Remove legacy SSH allowlist service file
  ansible.builtin.file:
    path: /etc/systemd/system/rke2-lab-ssh-allowlist.service
    state: absent

- name: Remove legacy SSH drop rule
  ansible.builtin.command: iptables -D INPUT -p tcp --dport 22 -j DROP
  changed_when: false
  failed_when: false

- name: Configure hosts file for RKE2 lab
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE RKE2 LAB HOSTS"
    block: |
      192.168.56.100 rke2-lb-01
      192.168.56.101 rke2-master-01
      192.168.56.102 rke2-worker-01
      192.168.56.103 rke2-worker-02

- name: Ensure systemd resolved config directory exists
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"

- name: Configure fallback DNS
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/dns_servers.conf
    content: |
      [Resolve]
      DNS=8.8.8.8 1.1.1.1
      FallbackDNS=8.8.4.4 1.0.0.1
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-resolved

- name: Show route to internet check target
  ansible.builtin.command: ip route get 8.8.8.8
  register: lab_internet_route
  changed_when: false
  failed_when: false
  when: lab_check_internet_connectivity | bool

- name: Print route to internet check target
  ansible.builtin.debug:
    var: lab_internet_route.stdout_lines
  when: lab_check_internet_connectivity | bool

- name: Check internet connectivity
  ansible.builtin.command: ping -c 2 8.8.8.8
  changed_when: false
  when: lab_check_internet_connectivity | bool
