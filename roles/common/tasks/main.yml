- name: Set hostname from inventory
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - vim
      - net-tools
      - open-iscsi
      - nfs-common
      - apparmor
      - apparmor-utils
      - ca-certificates
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Enable and start open-iscsi
  ansible.builtin.systemd:
    name: iscsid
    enabled: true
    state: started
  failed_when: false

- name: Disable swap immediately
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Disable swap permanently in fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'

- name: Configure Kubernetes kernel modules
  ansible.builtin.copy:
    dest: /etc/modules-load.d/k8s.conf
    content: |
      br_netfilter
      overlay
    owner: root
    group: root
    mode: "0644"

- name: Load br_netfilter module
  ansible.builtin.command: modprobe br_netfilter
  changed_when: false

- name: Load overlay module
  ansible.builtin.command: modprobe overlay
  changed_when: false

- name: Configure Kubernetes sysctl
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-kubernetes.conf
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward = 1
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl

- name: Apply sysctl immediately
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: Disable UFW for local lab
  ansible.builtin.systemd:
    name: ufw
    enabled: false
    state: stopped
  failed_when: false

- name: Configure hosts file for RKE2 lab
  ansible.builtin.blockinfile:
    path: /etc/hosts
    marker: "# {mark} ANSIBLE RKE2 LAB HOSTS"
    block: |
      192.168.56.100 rke2-lb-01
      192.168.56.101 rke2-master-01
      192.168.56.102 rke2-worker-01
      192.168.56.103 rke2-worker-02

- name: Ensure systemd resolved config directory exists
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: "0755"

- name: Configure fallback DNS
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/dns_servers.conf
    content: |
      [Resolve]
      DNS=8.8.8.8 1.1.1.1
      FallbackDNS=8.8.4.4 1.0.0.1
    owner: root
    group: root
    mode: "0644"
  notify: Restart systemd-resolved

- name: Check internet connectivity
  ansible.builtin.command: ping -c 2 8.8.8.8
  changed_when: false
