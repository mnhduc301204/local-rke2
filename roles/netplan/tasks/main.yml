- name: Skip netplan configuration when disabled
  ansible.builtin.meta: end_host
  when: not (lab_configure_netplan | bool)

- name: Require netplan config for this host
  ansible.builtin.assert:
    that:
      - inventory_hostname in lab_netplan_hosts
    fail_msg: "No lab_netplan_hosts entry for {{ inventory_hostname }}."

- name: Show detected network interfaces
  ansible.builtin.command: ip -br link
  register: netplan_interfaces
  changed_when: false

- name: Print detected network interfaces
  ansible.builtin.debug:
    var: netplan_interfaces.stdout_lines

- name: Ensure netplan directory exists
  ansible.builtin.file:
    path: /etc/netplan
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render RKE2 lab netplan file
  ansible.builtin.template:
    src: rke2-lab-netplan.yaml.j2
    dest: "{{ lab_netplan_file }}"
    owner: root
    group: root
    mode: "0600"

- name: Find existing netplan files
  ansible.builtin.find:
    paths: /etc/netplan
    patterns:
      - "*.yaml"
      - "*.yml"
    file_type: file
  register: lab_existing_netplan_files
  when: lab_netplan_disable_existing | bool

- name: Select unmanaged netplan files
  ansible.builtin.set_fact:
    lab_unmanaged_netplan_files: >-
      {{
        lab_existing_netplan_files.files
        | default([])
        | rejectattr('path', 'equalto', lab_netplan_file)
        | list
      }}
  when: lab_netplan_disable_existing | bool

- name: Ensure netplan backup directory exists
  ansible.builtin.file:
    path: "{{ lab_netplan_backup_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when:
    - lab_netplan_disable_existing | bool
    - lab_unmanaged_netplan_files | default([]) | length > 0

- name: Backup unmanaged netplan files
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ lab_netplan_backup_dir }}/{{ item.path | basename }}"
    remote_src: true
    owner: root
    group: root
    mode: "0600"
  loop: "{{ lab_unmanaged_netplan_files | default([]) }}"
  when: lab_netplan_disable_existing | bool

- name: Remove unmanaged netplan files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ lab_unmanaged_netplan_files | default([]) }}"
  when: lab_netplan_disable_existing | bool

- name: Validate netplan configuration
  ansible.builtin.command: netplan generate
  changed_when: false

- name: Apply netplan configuration
  ansible.builtin.command: netplan apply
  changed_when: true
  when: lab_netplan_apply | bool

- name: Show routes after netplan
  ansible.builtin.command: ip route
  register: netplan_routes
  changed_when: false

- name: Print routes after netplan
  ansible.builtin.debug:
    var: netplan_routes.stdout_lines
